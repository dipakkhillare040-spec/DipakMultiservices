<!-- =========================
ADVANCED GOV SCHEME PORTAL
Features:
- Login System (LocalStorage)
- Admin Panel (Add Schemes)
- Search System
- Scheme Detail Page
- Mobile Responsive UI
========================= -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gov Scheme Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#eef2f7;}
header{background:#1e3c72;color:#fff;padding:15px;text-align:center;font-size:20px;}
.container{padding:20px;}
input,button{padding:10px;margin:5px;border-radius:5px;border:1px solid #ccc;}
button{background:#1e3c72;color:#fff;border:none;cursor:pointer;}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
.hidden{display:none;}
</style>
</head>

<body>

<header>Gov Scheme Portal - Dipak</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
<h2>Admin Panel</h2>
<input type="text" id="schemeTitle" placeholder="Scheme Title">
<input type="text" id="schemeDesc" placeholder="Scheme Description">
<button onclick="addScheme()">Add Scheme</button>
</div>

<!-- SEARCH -->
<h2>Search Scheme</h2>
<input type="text" id="search" placeholder="Search..." onkeyup="searchScheme()">

<!-- SCHEME LIST -->
<div id="schemeList"></div>

</div>

<script>

// Default Login
const defaultUser = "admin";
const defaultPass = "1234";

// Load Schemes
let schemes = JSON.parse(localStorage.getItem("schemes")) || [
 {title:"PM Kisan Yojana",desc:"Financial support for farmers"},
 {title:"Scholarship Scheme",desc:"Support for students"}
];

function login(){
 let u = document.getElementById("username").value;
 let p = document.getElementById("password").value;

 if(u===defaultUser && p===defaultPass){
   document.getElementById("adminPanel").classList.remove("hidden");
   alert("Login Success");
 }else{
   alert("Wrong login");
 }
}

function addScheme(){
 let title = document.getElementById("schemeTitle").value;
 let desc = document.getElementById("schemeDesc").value;

 if(title && desc){
   schemes.push({title,desc});
   localStorage.setItem("schemes", JSON.stringify(schemes));
   displaySchemes();
 }
}

function displaySchemes(list = schemes){
 let html = "";
 list.forEach((s,i)=>{
  html += `
   <div class="card" onclick="viewDetail(${i})">
    <h3>${s.title}</h3>
    <p>${s.desc}</p>
   </div>`;
 });
 document.getElementById("schemeList").innerHTML = html;
}

function searchScheme(){
 let val = document.getElementById("search").value.toLowerCase();
 let filtered = schemes.filter(s => s.title.toLowerCase().includes(val));
 displaySchemes(filtered);
}

function viewDetail(i){
 alert("Scheme: " + schemes[i].title + "\n\n" + schemes[i].desc);
}

// Init
displaySchemes();

</script>

</body>
</html>
